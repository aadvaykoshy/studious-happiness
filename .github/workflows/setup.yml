name: Setup VM with Chrome and Input Director

on:
  push:
  workflow_dispatch:
    inputs:
      rdp_session_minutes:
        description: "How long to keep the RDP session alive (in minutes, max 120)"
        required: false
        default: "60"

jobs:
  setup:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Google Chrome
        shell: powershell
        run: |
          choco install googlechrome -y --no-progress
          Write-Host "Chrome installed successfully."

      - name: Verify Chrome installation
        shell: powershell
        run: |
          $chromePath = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          if (Test-Path $chromePath) {
            $version = (Get-Item $chromePath).VersionInfo.ProductVersion
            Write-Host "Google Chrome version: $version"
          } else {
            Write-Error "Chrome executable not found at expected path."
            exit 1
          }

      - name: Download and install Input Director
        shell: powershell
        run: |
          $installerUrl = "https://www.inputdirector.com/downloads/InputDirector-v1.4.2Setup.exe"
          $installerPath = "$env:TEMP\InputDirectorSetup.exe"
          Write-Host "Downloading Input Director..."
          try {
            Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath -UseBasicParsing -ErrorAction Stop
          } catch {
            Write-Error "Failed to download Input Director: $_"
            exit 1
          }
          if (-not (Test-Path $installerPath)) {
            Write-Error "Installer file not found after download."
            exit 1
          }
          Write-Host "Installing Input Director silently..."
          $process = Start-Process -FilePath $installerPath -ArgumentList "/S" -Wait -NoNewWindow -PassThru
          if ($process.ExitCode -ne 0) {
            Write-Error "Input Director installer exited with code $($process.ExitCode)."
            exit 1
          }
          Write-Host "Input Director installed successfully."

      - name: Verify Input Director installation
        shell: powershell
        run: |
          $inputDirPath = "C:\Program Files (x86)\Input Director\InputDirector.exe"
          if (Test-Path $inputDirPath) {
            Write-Host "Input Director found at: $inputDirPath"
          } else {
            Write-Warning "Input Director executable not found at expected path. Installation may have used a different directory."
          }

      # -- RDP access via Tailscale (free, no credit card required) ---------
      # Tailscale creates a private mesh network between this runner and your
      # local machine so you can connect with standard Remote Desktop.
      #
      # One-time setup:
      #   1. Sign up at https://tailscale.com (free, no credit card needed).
      #   2. Install Tailscale on your local machine and sign in.
      #   3. Generate an auth key at https://login.tailscale.com/admin/settings/keys
      #      (click "Generate auth key"; a reusable key is convenient).
      #   4. Add two GitHub repository secrets:
      #        RDP_PASSWORD      - the RDP password you want to use
      #        TAILSCALE_AUTHKEY - the auth key generated in step 3
      #
      # How to connect each time the workflow runs:
      #   1. In the workflow log, look for the "Tailscale IP" line.
      #      It will look like:  100.x.x.x
      #   2. Open Remote Desktop Connection (mstsc) on your local machine.
      #   3. In the "Computer" field enter:  100.x.x.x   (standard port 3389)
      #   4. Username: runneradmin   Password: <value of RDP_PASSWORD secret>
      # ---------------------------------------------------------------------

      - name: Enable Remote Desktop (RDP)
        shell: powershell
        run: |
          # Enable RDP in the registry
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name fDenyTSConnections -Value 0

          # Allow RDP through Windows Firewall
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Set the RDP password for the built-in runner account
          $password = ConvertTo-SecureString "$env:RDP_PASSWORD" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $password

          Write-Host "RDP enabled. Connect as user: runneradmin"
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}

      - name: Install Tailscale and join network
        shell: powershell
        run: |
          # Pinned Tailscale version for reproducibility
          $tsVersion  = "1.78.1"
          $tsInstaller = "$env:TEMP\tailscale-setup-$tsVersion.exe"
          $tsUrl       = "https://pkgs.tailscale.com/stable/tailscale-setup-$tsVersion.exe"

          Write-Host "Downloading Tailscale $tsVersion..."
          Invoke-WebRequest -Uri $tsUrl -OutFile $tsInstaller -UseBasicParsing

          # Install silently
          Write-Host "Installing Tailscale..."
          $proc = Start-Process -FilePath $tsInstaller -ArgumentList "/install", "/quiet", "/norestart" `
            -Wait -NoNewWindow -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Error "Tailscale installer exited with code $($proc.ExitCode)."
            exit 1
          }

          # Give the Tailscale service a moment to start
          Start-Sleep -Seconds 5

          # Use the GitHub run ID in the hostname to avoid conflicts when
          # multiple runners join the same network simultaneously.
          $hostname = "gh-runner-$env:GITHUB_RUN_ID"

          # Log in with the auth key -- runner joins your Tailscale network
          $tailscale = "C:\Program Files\Tailscale\tailscale.exe"
          & $tailscale up --authkey="$env:TAILSCALE_AUTHKEY" --hostname="$hostname"

          # Wait for the interface to get an IP (up to 30 seconds)
          $tsIP = $null
          for ($i = 0; $i -lt 15; $i++) {
            Start-Sleep -Seconds 2
            $status = & $tailscale status --json 2>$null | ConvertFrom-Json
            if ($status -and $status.Self -and $status.Self.TailscaleIPs -and $status.Self.TailscaleIPs.Count -gt 0) {
              # Prefer the IPv4 address (100.x.x.x range)
              $tsIP = $status.Self.TailscaleIPs | Where-Object { $_ -notmatch ':' } | Select-Object -First 1
              if ($tsIP) { break }
            }
          }

          if ($tsIP) {
            Write-Host ""
            Write-Host "=========================================="
            Write-Host "  Tailscale IP: $tsIP"
            Write-Host "  Username:     runneradmin"
            Write-Host "  Open Remote Desktop Connection (mstsc)"
            Write-Host "  and enter the IP above as the Computer."
            Write-Host "=========================================="
          } else {
            Write-Error "Tailscale did not obtain an IP address within 30 seconds."
            exit 1
          }
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Keep runner alive for RDP session
        shell: powershell
        run: |
          # Session duration comes from the workflow_dispatch input (default 60 min).
          # Falls back to 60 minutes when the workflow is triggered by a push event.
          $minutes = [int]"$env:SESSION_MINUTES"
          if ($minutes -le 0 -or $minutes -gt 120) { $minutes = 60 }
          $seconds = $minutes * 60
          Write-Host "Runner will stay alive for $minutes minute(s)."
          Write-Host "Cancel this workflow run when you are done with your RDP session."
          Start-Sleep -Seconds $seconds
        env:
          SESSION_MINUTES: ${{ github.event.inputs.rdp_session_minutes || '60' }}
